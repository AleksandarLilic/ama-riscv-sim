priv-mode:
  mode: m

general:
  total_instructions: 13500
  regs_not_use: x1,x2
  custom_trap_handler: false
  code_start_address: 0x0 # not used by the flow
  default_program_exit: false
  delegation: 0x000

isa-instruction-distribution:
  rel_rv32i.ctrl: 6
  rel_rv32i.compute: 20
  rel_rv32i.data: 20

  rel_rv32m: 20
  rel_rv32simd.mul: 10
  rel_rv32simd.wmul: 10
  rel_rv32simd.dot: 20
  rel_rv32simd.widen: 5
  rel_rv32simd.txp: 5
branch-control:
  backward-probability: 0.6
  block-size: 4

recursion-options:
  recursion-enable: false
  recursion-depth: 10
  recursion-calls: 5

data-hazards:
  raw_prob: 0.5
  war_prob: 0.5
  waw_prob: 0.5
  num_regs_lookbehind: 3

i-cache:
  num_calls: 0
  num_bytes_per_block: 64
  num_blocks: 8
  num_cycles: 5

d-cache:
  num_calls: 0
  num_bytes_per_block: 64
  num_blocks: 8
  num_cycles: 10

access-sections:
  section1: 0x10000,0x11000,rw
  #section1: 0x11000,0x12000,r

csr-sections:
  #sections: 0x51e:0x51e # tohost
  sections: 0x340:0x340 # mscratch

user-functions:
  randomize: '{64: "nop"}' # dc about function, new one is provided

switch-priv-modes:
  switch_modes: false
  num_switches: 0

exception-generation:
  ecause00: 0
  ecause01: 0
  ecause02: 0
  ecause03: 0
  ecause04: 0
  ecause05: 0
  ecause06: 0
  ecause07: 0
  ecause08: 0
  ecause09: 0
  ecause10: 0
  ecause11: 0
  ecause12: 0
  ecause13: 0
  ecause14: 0

program-macro:
  post_program_macro: "j pass"
