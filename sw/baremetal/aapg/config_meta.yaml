rv32_generic:
  general:
    total_instructions: 14000
  isa-instruction-distribution:
    rel_rv32i.ctrl: 1
    rel_rv32i.compute: 20
    rel_rv32i.data: 20
    rel_rv32m: 0

rv32_mem:
  general:
    total_instructions: 9000
  isa-instruction-distribution:
    rel_rv32i.ctrl: 1
    rel_rv32i.compute: 2
    rel_rv32i.data: 20
    rel_rv32m: 0

